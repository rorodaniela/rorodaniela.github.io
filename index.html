<!DOCTYPE html>
<html>
    <head>
        <title>Smart Home Login</title>
        <link href="index.css" rel="stylesheet">
    </head>
    <body>
        <div class="kotak1">
            <p id="font-login">Login</p>
            <p id="font-caption">Hi! Please login to enjoy controlling your home from Smart home</p>
            <div class="kotak2">
                <form action="./home.html">
                    <label for="username">Username :</label>
                    <br><br>
                    <input class="inputlogin" type="text" name="uname" id="username" required>
                    <br><br>
                    <label for="pw">Password :</label>
                    <br><br>
                    <input class="inputlogin" type="password" name="pw" id="pw" required>
                    <br><br>
                    <a href="./home.html"></a><input id="tombollogin"type="submit" value="Login">
                </form>
            </div>
        </div>
    </body>
</html>
